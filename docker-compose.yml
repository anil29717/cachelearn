version: "3.9"

services:
  db:
    image: mysql:8.4
    container_name: cachelearning-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: course_platform
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cachelearning-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: course_platform
      JWT_SECRET: change_me_in_docker
      FRONTEND_URL: http://localhost:4000
      BACKEND_URL: http://localhost:8080
      CONTACT_RECEIVER_EMAIL: admin@local.invalid
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cachelearning-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "4000:4000"

volumes:
  db_data:
