version: "3.9"

# Create `.env` from `.env.example` — do not commit real secrets.

services:
  db:
    image: mysql:8.4
    container_name: cachelearning-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env (see .env.example)}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-course_platform}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cachelearning-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-course_platform}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      CONTACT_RECEIVER_EMAIL: ${CONTACT_RECEIVER_EMAIL:-admin@local.invalid}
    ports:
      - "127.0.0.1:8080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cachelearning-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    ports:
      - "127.0.0.1:4000:4000"
    security_opt:
      - no-new-privileges:true

volumes:
  db_data:
